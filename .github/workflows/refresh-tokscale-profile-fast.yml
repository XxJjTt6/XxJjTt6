name: Fast refresh Tokscale profile

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tokscale-profile-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Refresh public Tokscale data
        run: npm run refresh:public

      - name: Verify generated files
        run: npm test

      - name: Commit refreshed profile
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No Tokscale profile changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md README.tokscale-v3.md assets data
          git commit -m "chore: fast refresh Tokscale profile data"
          git push
